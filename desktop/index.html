<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenHydra</title>
    <style>
      body { margin: 0; background: #0a0a0a; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0a0a0a; transition: opacity 0.5s ease-out;
      }
      #splash .logo { font-size: 3rem; margin-bottom: 1rem; }
      #splash .name { color: #e5e5e5; font-family: system-ui; font-size: 1.2rem; font-weight: 600; letter-spacing: 0.05em; }
      #splash .dots { display: flex; gap: 6px; margin-top: 1.5rem; }
      #splash .dot {
        width: 8px; height: 8px; border-radius: 50%; background: #00d4b8;
        animation: pulse 1.2s ease-in-out infinite;
      }
      #splash .dot:nth-child(2) { animation-delay: 0.2s; }
      #splash .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo">🦙</div>
      <div class="name">OpenHydra</div>
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
