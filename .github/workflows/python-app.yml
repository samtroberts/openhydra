name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Core test suite ──────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q protobuf-compiler

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,shell]"

      - name: Generate protobuf stubs
        run: make proto

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --tb=short \
            --cov=coordinator --cov=peer --cov=economy --cov=dht \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60
        env:
          OPENHYDRA_RUN_REAL_TENSOR_TEST: "0"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: .pytest_cache/
          retention-days: 7

  # ── Lint + type check ──────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install ruff basedpyright

      - name: Ruff check (style + security)
        # TODO: remove continue-on-error after import cleanup pass
        run: ruff check . --config pyproject.toml
        continue-on-error: true

      - name: Type check (basic)
        run: basedpyright coordinator/ peer/ economy/ --level basic
        continue-on-error: true

  # ── Security — dependency vulnerability scan ────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --strict --desc
        continue-on-error: true

  # ── Docs site (MkDocs Material) ──────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: pip install -e ".[docs]"

      - name: Build docs (strict)
        run: mkdocs build --strict

  # ── Landing page HTML ────────────────────────────────────────────────────────
  landing:
    name: Landing page
    runs-on: ubuntu-latest
    # Only run on pushes (PRs that don't touch landing/ skip this)
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML (non-blocking)
        run: |
          sudo apt-get install -y -q tidy 2>/dev/null || true
          if command -v tidy &>/dev/null; then
            find landing/ -name "*.html" -exec tidy -errors -quiet {} \; 2>&1 | \
              grep -v "^$" | grep -v "^Info:" || true
          else
            echo "tidy not available; skipping HTML validation"
          fi
          echo "Landing page check complete"
