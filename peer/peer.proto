syntax = "proto3";

package openhydra.peer;

service Peer {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Forward(ForwardRequest) returns (ForwardResponse);
  rpc GetPeerStatus(PeerStatusRequest) returns (PeerStatusResponse);
  // Phase 3A: Bidirectional streaming for persistent sessions.
  rpc ForwardStream(stream ForwardRequest) returns (stream ForwardResponse);
  // Petals parity Phase A: receives final activation from last peer in push chain.
  rpc PushResult(ForwardResponse) returns (PushAck);
}

message PingRequest {
  int64 sent_unix_ms = 1;
  string geo_nonce = 2;
  string geo_claimed_region = 3;
}

message PingResponse {
  string peer_id = 1;
  bool ok = 2;
  double load_pct = 3;
  string daemon_mode = 4;
  string geo_nonce_signature = 5;
}

message ForwardRequest {
  string request_id = 1;
  string prompt = 2;
  repeated float activation = 3;
  uint32 stage_index = 4;
  uint32 total_stages = 5;
  uint32 max_tokens = 6;
  bytes encrypted_activation = 7;
  repeated bytes encryption_nonces = 8;
  repeated bytes encryption_ephemeral_public_keys = 9;
  string encryption_suite = 10;
  uint32 encryption_layers = 11;
  string compression_codec = 12;
  uint32 compression_original_dim = 13;
  uint32 compression_latent_dim = 14;
  string kv_session_id = 15;
  bool kv_store_activation = 16;
  bool kv_use_cached_activation = 17;
  bytes onion_route_ciphertext = 18;
  repeated bytes onion_route_nonces = 19;
  repeated bytes onion_route_ephemeral_public_keys = 20;
  string onion_route_suite = 21;
  uint32 onion_route_layers = 22;
  bool decode_do_sample = 23;
  float decode_temperature = 24;
  float decode_top_p = 25;
  uint32 decode_top_k = 26;
  int64 decode_seed = 27;
  // Phase 3: Layer-sharding routing hint.
  // 0 = use the peer's own startup configuration.
  // When non-zero the coordinator is explicitly telling this peer which slice
  // of the model to run, enabling validation and observability.
  uint32 shard_layer_start = 28;   // first transformer layer this peer runs (inclusive)
  uint32 shard_layer_end = 29;     // one past the last layer (exclusive)
  uint32 shard_total_layers = 30;  // full model depth (e.g. 32 for LLaMA-3-8B)
  // DSD: Decentralized Speculative Decoding (P0-A)
  repeated int64 draft_token_ids = 31;   // K draft tokens for batch verification
  uint32 verify_batch_size = 32;         // number of draft tokens to verify (0 = normal forward)
  // INT8 activation compression (P0-B)
  bytes quantized_activation = 33;       // packed INT8 activation bytes
  string activation_quantization = 34;   // "int8" or "" (empty = fp32)
  repeated float quantized_scales = 35;  // per-tensor scale factors for dequantization
  // Server-to-server push mode (Petals parity Phase A).
  // When push_mode=true, the peer forwards its output directly to
  // next_hop_address instead of returning it to the caller.  The last
  // peer in the chain sends the final result to final_callback_address
  // via the PushResult RPC.
  bool push_mode = 36;
  string next_hop_address = 37;          // "host:port" of next peer (empty = last stage)
  string next_hop_peer_id = 38;          // peer_id of next peer for logging
  string final_callback_address = 39;    // coordinator address for PushResult delivery
  string final_callback_request_id = 40; // correlation ID for the PushResult
  // Remaining route hops (each peer pops the first entry and forwards the rest)
  repeated PeerHop remaining_route = 41;
  // Phase 4 (Gemma 4 sharded adapter): original prompt token IDs from the
  // first stage. Carried through every hop so downstream peers can re-derive
  // the per-layer input tensor locally (via ``embed_tokens_per_layer`` +
  // ``per_layer_model_projection`` + ``per_layer_projection_norm``) without
  // a wire format change to ``activation``. Unused by non-gemma4 families.
  // When empty the peer falls back to the standard llama/qwen_llama path.
  repeated int64 prompt_token_ids = 42;
  // Binary-packed float32 activation (struct.pack little-endian).
  // Faster serialization than repeated float — single memcpy vs per-element.
  // When non-empty, takes precedence over the `activation` field.
  bytes activation_packed = 43;
  // Cross-ISP: coordinator's libp2p peer ID for PushResult relay routing.
  string final_callback_libp2p_peer_id = 44;
}

// A single hop in the push-mode routing chain.
message PeerHop {
  string peer_id = 1;
  string address = 2;       // "host:port"
  uint32 stage_index = 3;
  uint32 shard_layer_start = 4;
  uint32 shard_layer_end = 5;
  uint32 shard_total_layers = 6;
  // Cross-ISP: libp2p peer ID for relay proxy routing at each hop.
  string libp2p_peer_id = 7;
}

// Acknowledgement from coordinator after receiving PushResult.
message PushAck {
  string request_id = 1;
  bool ok = 2;
  string error = 3;
}

message ForwardResponse {
  string request_id = 1;
  string peer_id = 2;
  repeated float activation = 3;
  uint32 stage_index = 4;
  string error = 5;
  bool kv_cache_hit = 6;
  bytes onion_route_ciphertext = 7;
  repeated bytes onion_route_nonces = 8;
  repeated bytes onion_route_ephemeral_public_keys = 9;
  string onion_route_suite = 10;
  uint32 onion_route_layers = 11;
  string onion_next_peer_id = 12;
  bool dp_noise_applied = 13;
  double dp_noise_configured_variance = 14;
  double dp_noise_observed_variance = 15;
  double dp_noise_observed_std = 16;
  uint64 dp_noise_payload_index = 17;
  string dp_noise_audit_tag = 18;
  uint32 compression_latent_dim = 19;
  // DSD: verified token IDs from batch verification
  repeated int64 verified_token_ids = 20;
  // INT8 activation compression
  bytes quantized_activation = 21;
  repeated float quantized_scales = 22;
  string activation_quantization = 23;
  // TOPLOC: hash of activation for integrity verification (P2-B)
  bytes activation_hash = 24;
  // Binary-packed float32 activation (zero-copy Rust encode).
  // When non-empty, takes precedence over the `activation` field.
  bytes activation_packed = 25;
}

message PeerStatusRequest {}

message PeerStatusResponse {
  string peer_id = 1;
  string model_id = 2;
  uint32 shard_index = 3;
  uint32 total_shards = 4;
  double load_pct = 5;
  bool healthy = 6;
  string daemon_mode = 7;
  double dp_noise_configured_variance = 8;
  uint64 dp_noise_payloads = 9;
  double dp_noise_observed_variance_ema = 10;
  string dp_noise_last_audit_tag = 11;
}
