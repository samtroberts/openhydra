# nginx.conf — OpenHydra HA reverse proxy
# Balances HTTP traffic across two coordinator replicas.
# TLS termination is handled upstream (cloud LB or certbot on the host);
# this config listens on port 80 only.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # -------------------------------------------------------------------------
    # Log format: standard combined + upstream address and request duration
    # -------------------------------------------------------------------------
    log_format openhydra_combined
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log openhydra_combined;
    error_log  /var/log/nginx/error.log  warn;

    # -------------------------------------------------------------------------
    # Gzip — compress JSON API responses
    # -------------------------------------------------------------------------
    gzip            on;
    gzip_types      application/json text/plain application/x-ndjson;
    gzip_min_length 256;
    gzip_proxied    any;

    # -------------------------------------------------------------------------
    # Upstreams
    # -------------------------------------------------------------------------

    # General upstream: least-conn across both coordinators.
    # Used for all routes except /v1/chat/completions.
    upstream openhydra_coordinators {
        least_conn;
        server coordinator-1:8080;
        server coordinator-2:8080;
    }

    # Sticky upstream: ip_hash pins each client IP to one coordinator.
    # Required for /v1/chat/completions so that SSE streaming connections
    # are not split across backends mid-response.
    upstream openhydra_coordinators_sticky {
        ip_hash;
        server coordinator-1:8080;
        server coordinator-2:8080;
    }

    # Single-backend upstream for /metrics.
    # Prometheus scrapes both coordinators directly via their own targets;
    # nginx only needs to surface one for ad-hoc checks.
    upstream openhydra_metrics {
        server coordinator-1:8080;
    }

    # -------------------------------------------------------------------------
    # Common proxy header snippet (reused via map / inline)
    # -------------------------------------------------------------------------
    map $http_x_request_id $req_id {
        default $http_x_request_id;
        ""      $request_id;        # generate one if the client didn't send it
    }

    # -------------------------------------------------------------------------
    # Server block — port 80
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Global proxy settings
        proxy_http_version      1.1;
        proxy_set_header        Connection          "";   # enable keepalives to backends
        proxy_set_header        Host                $host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_set_header        X-Request-ID        $req_id;

        # Pass the request-ID back to the caller so it can be correlated
        add_header              X-Request-ID        $req_id always;

        # Long timeout for inference requests (model calls can be slow)
        proxy_read_timeout      120s;
        proxy_connect_timeout   5s;
        proxy_send_timeout      30s;

        # Disable buffering — required for SSE / chunked streaming responses
        proxy_buffering         off;
        proxy_cache             off;

        # -----------------------------------------------------------------
        # /v1/chat/completions — sticky (ip_hash) for streaming correctness
        # -----------------------------------------------------------------
        location /v1/chat/completions {
            proxy_pass http://openhydra_coordinators_sticky;
        }

        # -----------------------------------------------------------------
        # /readyz — health probe; any healthy backend may respond
        # -----------------------------------------------------------------
        location /readyz {
            proxy_pass http://openhydra_coordinators;
            # Short timeouts for health checks
            proxy_read_timeout    5s;
            proxy_connect_timeout 2s;
        }

        # -----------------------------------------------------------------
        # /metrics — proxy to coordinator-1 only for ad-hoc scrapes;
        # Prometheus should be configured to scrape coordinator-1:8080
        # and coordinator-2:8080 directly as separate targets.
        # -----------------------------------------------------------------
        location /metrics {
            proxy_pass http://openhydra_metrics;
        }

        # -----------------------------------------------------------------
        # Everything else — least-conn across both coordinators
        # -----------------------------------------------------------------
        location / {
            proxy_pass http://openhydra_coordinators;
        }
    }

    # -------------------------------------------------------------------------
    # TLS block (uncomment after cert provisioning)
    # -------------------------------------------------------------------------
    # Prerequisites:
    #   - Run certbot (or equivalent) to populate /etc/openhydra/certs/
    #   - Update server_name to your actual domain
    #   - Add a port 80 -> 443 redirect in the HTTP server block above
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name openhydra.example.com;
    #
    #     ssl_certificate     /etc/openhydra/certs/fullchain.pem;
    #     ssl_certificate_key /etc/openhydra/certs/privkey.pem;
    #
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # HSTS (enable only once you are confident in the TLS setup)
    #     # add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # Reuse the same proxy_pass directives from the HTTP server block above.
    #     # Copy or refactor into a shared include file, e.g.:
    #     #   include /etc/nginx/conf.d/openhydra_locations.conf;
    #
    #     proxy_read_timeout    120s;
    #     proxy_buffering       off;
    #
    #     location /v1/chat/completions {
    #         proxy_pass http://openhydra_coordinators_sticky;
    #     }
    #
    #     location /readyz {
    #         proxy_pass   http://openhydra_coordinators;
    #         proxy_read_timeout    5s;
    #         proxy_connect_timeout 2s;
    #     }
    #
    #     location /metrics {
    #         proxy_pass http://openhydra_metrics;
    #     }
    #
    #     location / {
    #         proxy_pass http://openhydra_coordinators;
    #     }
    # }
}
