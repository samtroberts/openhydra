site_name: OpenHydra
site_description: Decentralised peer-to-peer LLM inference network
site_url: https://openhydra.co/docs
repo_url: https://github.com/openhydra-ai/openhydra
repo_name: openhydra-ai/openhydra
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: false
            show_root_heading: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Quick Start: quickstart.md
  - API Reference: api-reference.md
  - Operator Guide: operator-guide.md
  - SDK:
    - Python: sdk/python.md
    - TypeScript: sdk/typescript.md
  - Comparisons:
    - Petals: petals-comparison.md
    - Beta Launch Strategy: beta-launch-strategy.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/openhydra-ai/openhydra
  version:
    provider: mike

